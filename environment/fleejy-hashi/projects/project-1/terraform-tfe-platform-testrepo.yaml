terraform-tfe-platform-testrepo:
  workspace_config:
    arguments:
      team_access:
        team-A:
          runs: apply
          variables: read
          state_versions: read-outputs
          sentinel_mocks: none
          workspace_locking: true
          run_tasks: false
      workspace_name: terraform-tfe-platform-testrepo
      project_name: project-1
      tag_names:
        - project-1
      description: "This is a test workspace using fleejy/terraform-tfe-platform-testrepo"
      working_directory: ""
      file_triggers_enabled: true
      trigger_patterns:
        - "*.tf"
      vcs_repo:
        arguments:
          identifier: fleejy/terraform-tfe-platform-testrepo
